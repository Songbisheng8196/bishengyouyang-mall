<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>毕生优养 - 管理后台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --warm-cream: #FAF6F1;
            --light-cream: #F5F0E8;
            --soft-beige: #E8E0D5;
            --gold: #C9A96E;
            --light-gold: #D4B97A;
            --warm-brown: #8B7355;
            --bean-green: #A8C69F;
            --light-green: #C5DDB8;
            --pale-green: #E8F0E0;
            --text-dark: #3D3D3D;
            --text-light: #7A7A7A;
            --white: #FFFFFF;
            --danger: #E74C3C;
            --success: #27AE60;
        }

        body {
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--warm-cream);
            color: var(--text-dark);
            line-height: 1.6;
        }

        /* Login Page */
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--warm-cream) 0%, var(--light-cream) 100%);
        }

        .login-box {
            background: var(--white);
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(139, 115, 85, 0.15);
            width: 100%;
            max-width: 420px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .login-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, var(--gold) 0%, var(--light-gold) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
            margin: 0 auto 18px;
        }

        .login-header h1 {
            font-size: 24px;
            color: var(--warm-brown);
            margin-bottom: 8px;
        }

        .login-header p {
            font-size: 13px;
            color: var(--text-light);
        }

        .form-group {
            margin-bottom: 22px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            color: var(--text-dark);
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--soft-beige);
            border-radius: 10px;
            font-size: 14px;
            color: var(--text-dark);
            transition: all 0.3s;
            outline: none;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(201, 169, 110, 0.1);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--gold) 0%, var(--light-gold) 100%);
            color: var(--white);
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(201, 169, 110, 0.3);
        }

        .btn-secondary {
            background: var(--white);
            color: var(--text-dark);
            border: 1px solid var(--soft-beige);
        }

        .btn-secondary:hover {
            border-color: var(--gold);
            color: var(--gold);
        }

        .btn-danger {
            background: var(--danger);
        }

        .btn-danger:hover {
            box-shadow: 0 6px 20px rgba(231, 76, 60, 0.3);
        }

        .btn-success {
            background: var(--success);
        }

        .btn-success:hover {
            box-shadow: 0 6px 20px rgba(39, 174, 96, 0.3);
        }

        /* Dashboard */
        .dashboard {
            display: none;
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            width: 240px;
            background: var(--white);
            box-shadow: 2px 0 15px rgba(139, 115, 85, 0.08);
            padding: 25px 0;
            z-index: 100;
        }

        .sidebar-header {
            padding: 0 20px 25px;
            border-bottom: 1px solid var(--light-cream);
            margin-bottom: 20px;
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--gold) 0%, var(--light-gold) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .sidebar-logo-text {
            font-size: 16px;
            font-weight: 600;
            color: var(--warm-brown);
        }

        .sidebar-menu {
            list-style: none;
        }

        .sidebar-menu li {
            margin-bottom: 5px;
        }

        .sidebar-menu a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            color: var(--text-dark);
            text-decoration: none;
            font-size: 14px;
            transition: all 0.3s;
            border-radius: 8px;
            margin: 0 10px;
        }

        .sidebar-menu a:hover,
        .sidebar-menu a.active {
            background: var(--pale-green);
            color: var(--warm-brown);
        }

        .sidebar-menu a span {
            font-size: 18px;
        }

        .main-content {
            margin-left: 240px;
            padding: 30px;
            min-height: 100vh;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--soft-beige);
        }

        .page-title {
            font-size: 22px;
            color: var(--warm-brown);
            font-weight: 600;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-name {
            font-size: 13px;
            color: var(--text-light);
        }

        .logout-btn {
            padding: 8px 18px;
            background: var(--white);
            border: 1px solid var(--soft-beige);
            border-radius: 8px;
            font-size: 13px;
            color: var(--text-dark);
            cursor: pointer;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            border-color: var(--danger);
            color: var(--danger);
        }

        /* Content Sections */
        .content-section {
            display: none;
            background: var(--white);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(139, 115, 85, 0.06);
        }

        .content-section.active {
            display: block;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--light-cream);
        }

        .section-title {
            font-size: 18px;
            color: var(--warm-brown);
            font-weight: 600;
        }

        .add-btn {
            padding: 10px 20px;
            background: linear-gradient(135deg, var(--bean-green) 0%, var(--light-green) 100%);
            color: var(--white);
            border: none;
            border-radius: 10px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .add-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(168, 198, 159, 0.3);
        }

        /* Data Table */
        .data-table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table th {
            text-align: left;
            padding: 14px 16px;
            background: var(--warm-cream);
            font-size: 13px;
            color: var(--warm-brown);
            font-weight: 600;
            border-radius: 8px;
        }

        .data-table td {
            padding: 16px;
            border-bottom: 1px solid var(--light-cream);
            font-size: 14px;
        }

        .data-table tr:last-child td {
            border-bottom: none;
        }

        .data-table tr:hover {
            background: var(--warm-cream);
        }

        .action-btns {
            display: flex;
            gap: 8px;
        }

        .edit-btn,
        .delete-btn {
            padding: 6px 14px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .edit-btn {
            background: var(--pale-green);
            color: var(--warm-brown);
        }

        .edit-btn:hover {
            background: var(--bean-green);
            color: var(--white);
        }

        .delete-btn {
            background: rgba(231, 76, 60, 0.1);
            color: var(--danger);
        }

        .delete-btn:hover {
            background: var(--danger);
            color: var(--white);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--white);
            border-radius: 16px;
            padding: 35px;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--light-cream);
        }

        .modal-title {
            font-size: 18px;
            color: var(--warm-brown);
            font-weight: 600;
        }

        .close-btn {
            width: 32px;
            height: 32px;
            background: var(--warm-cream);
            border: none;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .close-btn:hover {
            background: var(--soft-beige);
        }

        .modal-body {
            margin-bottom: 25px;
        }

        .modal-footer {
            display: flex;
            gap: 12px;
        }

        .modal-footer .btn {
            flex: 1;
        }

        /* Banner Preview */
        .banner-preview {
            height: 80px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            margin-bottom: 10px;
        }

        .banner-preview-1 {
            background: linear-gradient(135deg, #E8DCC8 0%, #D8C8A8 40%, #C9A96E 100%);
        }

        .banner-preview-2 {
            background: linear-gradient(135deg, #C5DDB8 0%, #A8C69F 50%, #8FB583 100%);
        }

        .banner-preview-3 {
            background: linear-gradient(135deg, #F5F0E8 0%, #E8DCC8 50%, #D4C4A8 100%);
        }

        /* Status Badge */
        .status-badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-active {
            background: rgba(39, 174, 96, 0.1);
            color: var(--success);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
        }

        .empty-state-icon {
            font-size: 60px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-state p {
            font-size: 14px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                width: 200px;
            }

            .main-content {
                margin-left: 200px;
                padding: 20px;
            }

            .login-box {
                padding: 40px 30px;
                margin: 20px;
            }
        }
    </style>
</head>
<body>
    <!-- Login Page -->
    <div class="login-container" id="loginPage">
        <div class="login-box">
            <div class="login-header">
                <div class="login-icon">🔐</div>
                <h1>管理后台登录</h1>
                <p>请输入管理员账号和密码</p>
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <label>账号</label>
                    <input type="text" id="username" placeholder="请输入账号" required>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="password" placeholder="请输入密码" required>
                </div>
                <button type="submit" class="btn">登录</button>
            </form>
            <div style="margin-top: 20px; text-align: center; font-size: 12px; color: var(--text-light);">
                <p>默认账号：admin | 密码：123456</p>
            </div>
        </div>
    </div>

    <!-- Dashboard -->
    <div class="dashboard" id="dashboard">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <div class="sidebar-logo-icon">🌿</div>
                    <div class="sidebar-logo-text">毕生优养后台</div>
                </div>
            </div>
            <ul class="sidebar-menu">
                <li><a href="#" class="active" data-section="banners"><span>🎯</span> 轮播管理</a></li>
                <li><a href="#" data-section="products"><span>📦</span> 产品管理</a></li>
                <li><a href="#" data-section="preview"><span>👁️</span> 前台预览</a></li>
            </ul>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <div class="top-bar">
                <div class="page-title" id="pageTitle">轮播管理</div>
                <div class="user-info">
                    <span class="user-name">管理员</span>
                    <button class="logout-btn" id="logoutBtn">退出登录</button>
                </div>
            </div>

            <!-- Banners Section -->
            <div class="content-section active" id="bannersSection">
                <div class="section-header">
                    <div class="section-title">轮播海报管理</div>
                </div>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th style="width: 60px;">序号</th>
                            <th style="width: 150px;">预览</th>
                            <th>标题</th>
                            <th>描述</th>
                            <th style="width: 100px;">操作</th>
                        </tr>
                    </thead>
                    <tbody id="bannersTableBody">
                    </tbody>
                </table>
            </div>

            <!-- Products Section -->
            <div class="content-section" id="productsSection">
                <div class="section-header">
                    <div class="section-title">产品管理</div>
                    <button class="add-btn" id="addProductBtn">+ 新增产品</button>
                </div>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th style="width: 60px;">序号</th>
                            <th>品牌</th>
                            <th>产品名称</th>
                            <th>配料</th>
                            <th style="width: 80px;">价格</th>
                            <th style="width: 100px;">操作</th>
                        </tr>
                    </thead>
                    <tbody id="productsTableBody">
                    </tbody>
                </table>
            </div>

            <!-- Preview Section -->
            <div class="content-section" id="previewSection">
                <div class="section-header">
                    <div class="section-title">前台预览</div>
                    <a href="index.html" target="_blank" class="add-btn">在新窗口打开前台</a>
                </div>
                <div style="padding: 40px; text-align: center; background: var(--warm-cream); border-radius: 12px;">
                    <p style="font-size: 16px; color: var(--warm-brown); margin-bottom: 15px;">点击上方按钮查看前台效果</p>
                    <p style="font-size: 13px; color: var(--text-light);">后台修改的内容会自动同步到前台页面</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Banner Modal -->
    <div class="modal" id="bannerModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">编辑轮播海报</div>
                <button class="close-btn" onclick="closeModal('bannerModal')">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>海报预览</label>
                    <div class="banner-preview" id="bannerPreview">🌾</div>
                </div>
                <div class="form-group">
                    <label>标题</label>
                    <input type="text" id="bannerTitle" placeholder="请输入标题">
                </div>
                <div class="form-group">
                    <label>描述</label>
                    <textarea id="bannerDesc" rows="3" placeholder="请输入描述"></textarea>
                </div>
                <div class="form-group">
                    <label>按钮文字</label>
                    <input type="text" id="bannerBtn" placeholder="请输入按钮文字">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('bannerModal')">取消</button>
                <button class="btn btn-success" onclick="saveBanner()">保存</button>
            </div>
        </div>
    </div>

    <!-- Product Modal -->
    <div class="modal" id="productModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title" id="productModalTitle">新增产品</div>
                <button class="close-btn" onclick="closeModal('productModal')">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>品牌</label>
                    <select id="productBrand">
                        <option value="bsyy">毕生优养</option>
                        <option value="dyf">豆养坊</option>
                        <option value="skyq">宋康优泉</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>产品名称</label>
                    <input type="text" id="productName" placeholder="请输入产品名称">
                </div>
                <div class="form-group">
                    <label>配料信息</label>
                    <textarea id="productIngredients" rows="2" placeholder="请输入配料信息"></textarea>
                </div>
                <div class="form-group">
                    <label>价格（元）</label>
                    <input type="number" id="productPrice" placeholder="请输入价格">
                </div>
                <div class="form-group">
                    <label>标签</label>
                    <select id="productBadge">
                        <option value="精选">精选</option>
                        <option value="有机">有机</option>
                        <option value="热销">热销</option>
                        <option value="新品">新品</option>
                        <option value="推荐">推荐</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('productModal')">取消</button>
                <button class="btn btn-success" onclick="saveProduct()">保存</button>
            </div>
        </div>
    </div>

    <script>
        // Default Data
        const defaultBanners = [
            {
                id: 1,
                title: '天然食养 · 品质生活',
                desc: '甄选各地优质食材 传承千年食养智慧',
                btn: '立即选购',
                icon: '🌾',
                preview: 'banner-preview-1'
            },
            {
                id: 2,
                title: '毕生优养 · 营养师会员',
                desc: '专属权益 专属优惠 专属服务',
                btn: '了解详情',
                icon: '👩‍⚕️',
                preview: 'banner-preview-2'
            },
            {
                id: 3,
                title: '三大品牌 · 匠心之作',
                desc: '毕生优养 · 豆养坊 · 宋康优泉',
                btn: '品牌故事',
                icon: '💎',
                preview: 'banner-preview-3'
            }
        ];

        const defaultProducts = [
            {
                id: 1,
                brand: 'bsyy',
                brandName: '毕生优养',
                name: '核桃芝麻黑豆粉',
                ingredients: '配料：黑芝麻、核桃、黑豆、山药',
                price: 128,
                badge: '精选',
                icon: '🌾'
            },
            {
                id: 2,
                brand: 'dyf',
                brandName: '豆养坊',
                name: '有机黄豆浆粉',
                ingredients: '配料：有机黄豆',
                price: 68,
                badge: '有机',
                icon: '🫘'
            },
            {
                id: 3,
                brand: 'skyq',
                brandName: '宋康优泉',
                name: '桂花雪梨枇杷膏',
                ingredients: '配料：雪梨、枇杷、桂花、蜂蜜',
                price: 88,
                badge: '热销',
                icon: '🍯'
            },
            {
                id: 4,
                brand: 'bsyy',
                brandName: '毕生优养',
                name: '红枣枸杞山药粉',
                ingredients: '配料：红枣、枸杞、山药、芡实',
                price: 118,
                badge: '新品',
                icon: '🌿'
            }
        ];

        // Initialize Data
        if (!localStorage.getItem('banners')) {
            localStorage.setItem('banners', JSON.stringify(defaultBanners));
        }
        if (!localStorage.getItem('products')) {
            localStorage.setItem('products', JSON.stringify(defaultProducts));
        }

        // Login
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            if (username === 'admin' && password === '123456') {
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                loadBanners();
                loadProducts();
            } else {
                alert('账号或密码错误！\n\n默认账号：admin\n默认密码：123456');
            }
        });

        // Logout
        document.getElementById('logoutBtn').addEventListener('click', function() {
            if (confirm('确定要退出登录吗？')) {
                document.getElementById('dashboard').style.display = 'none';
                document.getElementById('loginPage').style.display = 'flex';
                document.getElementById('username').value = '';
                document.getElementById('password').value = '';
            }
        });

        // Sidebar Navigation
        document.querySelectorAll('.sidebar-menu a').forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                document.querySelectorAll('.sidebar-menu a').forEach(l => l.classList.remove('active'));
                this.classList.add('active');

                const section = this.dataset.section;
                document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
                document.getElementById(section + 'Section').classList.add('active');

                const titles = {
                    'banners': '轮播管理',
                    'products': '产品管理',
                    'preview': '前台预览'
                };
                document.getElementById('pageTitle').textContent = titles[section];
            });
        });

        // Load Banners
        function loadBanners() {
            const banners = JSON.parse(localStorage.getItem('banners'));
            const tbody = document.getElementById('bannersTableBody');
            tbody.innerHTML = '';

            banners.forEach((banner, index) => {
                tbody.innerHTML += `
                    <tr>
                        <td>${index + 1}</td>
                        <td><div class="banner-preview ${banner.preview}" style="height: 60px; font-size: 24px;">${banner.icon}</div></td>
                        <td>${banner.title}</td>
                        <td style="color: var(--text-light); font-size: 13px;">${banner.desc}</td>
                        <td>
                            <div class="action-btns">
                                <button class="edit-btn" onclick="editBanner(${banner.id})">编辑</button>
                            </div>
                        </td>
                    </tr>
                `;
            });
        }

        // Edit Banner
        let currentBannerId = null;
        function editBanner(id) {
            const banners = JSON.parse(localStorage.getItem('banners'));
            const banner = banners.find(b => b.id === id);
            currentBannerId = id;

            document.getElementById('bannerTitle').value = banner.title;
            document.getElementById('bannerDesc').value = banner.desc;
            document.getElementById('bannerBtn').value = banner.btn;
            document.getElementById('bannerPreview').className = 'banner-preview ' + banner.preview;
            document.getElementById('bannerPreview').textContent = banner.icon;

            document.getElementById('bannerModal').classList.add('active');
        }

        // Save Banner
        function saveBanner() {
            const banners = JSON.parse(localStorage.getItem('banners'));
            const index = banners.findIndex(b => b.id === currentBannerId);

            banners[index].title = document.getElementById('bannerTitle').value;
            banners[index].desc = document.getElementById('bannerDesc').value;
            banners[index].btn = document.getElementById('bannerBtn').value;

            localStorage.setItem('banners', JSON.stringify(banners));
            closeModal('bannerModal');
            loadBanners();
            alert('保存成功！前台页面已同步更新。');
        }

        // Load Products
        function loadProducts() {
            const products = JSON.parse(localStorage.getItem('products'));
            const tbody = document.getElementById('productsTableBody');
            tbody.innerHTML = '';

            products.forEach((product, index) => {
                tbody.innerHTML += `
                    <tr>
                        <td>${index + 1}</td>
                        <td><span class="status-badge status-active">${product.brandName}</span></td>
                        <td>${product.name}</td>
                        <td style="color: var(--text-light); font-size: 13px;">${product.ingredients}</td>
                        <td style="font-weight: 600; color: var(--warm-brown);">¥${product.price}</td>
                        <td>
                            <div class="action-btns">
                                <button class="edit-btn" onclick="editProduct(${product.id})">编辑</button>
                                <button class="delete-btn" onclick="deleteProduct(${product.id})">删除</button>
                            </div>
                        </td>
                    </tr>
                `;
            });
        }

        // Add Product
        document.getElementById('addProductBtn').addEventListener('click', function() {
            currentProductId = null;
            document.getElementById('productModalTitle').textContent = '新增产品';
            document.getElementById('productBrand').value = 'bsyy';
            document.getElementById('productName').value = '';
            document.getElementById('productIngredients').value = '';
            document.getElementById('productPrice').value = '';
            document.getElementById('productBadge').value = '精选';
            document.getElementById('productModal').classList.add('active');
        });

        // Edit Product
        let currentProductId = null;
        function editProduct(id) {
            const products = JSON.parse(localStorage.getItem('products'));
            const product = products.find(p => p.id === id);
            currentProductId = id;

            document.getElementById('productModalTitle').textContent = '编辑产品';
            document.getElementById('productBrand').value = product.brand;
            document.getElementById('productName').value = product.name;
            document.getElementById('productIngredients').value = product.ingredients;
            document.getElementById('productPrice').value = product.price;
            document.getElementById('productBadge').value = product.badge;

            document.getElementById('productModal').classList.add('active');
        }

        // Save Product
        function saveProduct() {
            const products = JSON.parse(localStorage.getItem('products'));
            const brandNames = {
                'bsyy': '毕生优养',
                'dyf': '豆养坊',
                'skyq': '宋康优泉'
            };
            const brandIcons = {
                'bsyy': '🌾',
                'dyf': '🫘',
                'skyq': '🍯'
            };

            const productData = {
                brand: document.getElementById('productBrand').value,
                brandName: brandNames[document.getElementById('productBrand').value],
                name: document.getElementById('productName').value,
                ingredients: document.getElementById('productIngredients').value,
                price: parseInt(document.getElementById('productPrice').value),
                badge: document.getElementById('productBadge').value,
                icon: brandIcons[document.getElementById('productBrand').value]
            };

            if (currentProductId) {
                const index = products.findIndex(p => p.id === currentProductId);
                products[index] = { ...products[index], ...productData };
            } else {
                const newId = Math.max(...products.map(p => p.id)) + 1;
                products.push({ id: newId, ...productData });
            }

            localStorage.setItem('products', JSON.stringify(products));
            closeModal('productModal');
            loadProducts();
            alert('保存成功！前台页面已同步更新。');
        }

        // Delete Product
        function deleteProduct(id) {
            if (confirm('确定要删除这个产品吗？')) {
                const products = JSON.parse(localStorage.getItem('products'));
                const newProducts = products.filter(p => p.id !== id);
                localStorage.setItem('products', JSON.stringify(newProducts));
                loadProducts();
                alert('删除成功！前台页面已同步更新。');
            }
        }

        // Close Modal
        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        // Close modal on outside click
        document.querySelectorAll('.modal').forEach(modal => {
            modal.addEventListener('click', function(e) {
                if (e.target === this) {
                    this.classList.remove('active');
                }
            });
        });
    </script>
</body>
</html>
