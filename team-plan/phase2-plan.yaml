         - 每题显示：题目内容/选项/维度/权重体质
         - 新增题目按钮：弹窗表单（title/options/dimension/weightType）
         - 编辑题目：修改题目内容
         - 题目排序：上下拖拽调整顺序

      3. 推荐方案管理（admin/src/views/Constitution/recommendations.vue）：
         - 9种体质 × 推荐产品/食谱/课程 列表
         - 每个体质可配置推荐 SKU 列表
         - 保存调用 PUT /api/admin/constitution/recommendations

      ## 输出
      - 所有代码写入 D:\bisheng-youyang\admin\
      - 完成后写入 deliverable.md
    assigned_to: mini-frontend
    depends_on: [p2b-constitution]
    verified_by: [verifier]
    verify_prompt: |
      验证 admin/src/views/Constitution/questions.vue 是否存在且包含题目增删改查逻辑。
      验证 admin/src/views/Constitution/recommendations.vue 是否存在。
      如全部存在 PASS，否则 FAIL 并列出缺失项。
    timeout_ms: 1800000

  # ===== Track C: AI 视频课程 =====
  - id: p2b-course-api
    title: '后端课程视频接口 + 课程数据录入'
    prompt: |
      你负责为毕生优养商城 Phase2 后端课程模块。Phase2 PRD 补充文档在 D:\bisheng-youyang\docs\Phase2-PRD补充.md，请先阅读。

      ## 必须完成的内容
      1. 扩展课程数据模型（backend/src/models/course.js）：
         - 新增字段：videoUrl/String/封面图、coverImage/String/简介、script/Text/讲义脚本、chapters/JSON/章节列表（[{title, startTime, content}]）、categoryType/enum/免费/会员/配套

      2. 创建课程视频上传接口（backend/src/routes/course.js）：
         - POST /api/admin/courses/upload-video — 接收 mp4 视频文件（最大 500MB），保存到 backend/uploads/courses/，返回 videoUrl
         - 使用 multer 配置 video 类型的文件过滤器

      3. 更新课程接口（backend/src/controllers/courseController.js）：
         - GET /api/courses — 返回课程列表（包含 videoUrl/coverImage/title/categoryType）
         - GET /api/courses/:id — 返回完整课程信息（含 chapters/script）
         - GET /api/courses?categoryType=免费 — 筛选免费课程

      4. 创建首批课程数据（backend/database/courses.json）：
         - 10门课程数据（标题/简介/封面图占位URL/视频URL占位/chapters/script占位）
         - 免费课×3/会员课×5/配套课×2

      ## 约束
      - 视频 URL 可先用占位 URL，Phase2 视频生成后替换
      - 章节格式：[{title: "第一章", startTime: "00:00", content: "章节内容摘要"}]

      ## 输出
      - 所有代码写入 D:\bisheng-youyang\backend\
      - 完成后写入 deliverable.md
    assigned_to: mini-backend
    verified_by: [verifier]
    verify_prompt: |
      验证 backend/src/models/course.js 是否包含 videoUrl/coverImage/script/chapters/categoryType 字段。
      验证 backend/src/routes/course.js 是否包含视频上传接口。
      验证 backend/database/courses.json 是否包含10门课程数据。
      如全部存在 PASS，否则 FAIL 并列出缺失项。
    timeout_ms: 1800000

  - id: p2f-course-frontend
